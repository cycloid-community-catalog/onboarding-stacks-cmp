description: "Open Adminer in a component tab, auto-connected to PostgreSQL from Terraform outputs."
icon: "https://www.adminer.org/favicon.ico"

configuration:
  - name: "Database port"
    description: "Default PostgreSQL port when the Terraform output does not include one."
    key: db_port
    widget: simple_text
    type: string
    default: "5432"
    required: true

  - name: "Cycloid API URL (fallback)"
    description: "Only used when PROXY_URL is not injected by the Plugin Manager. Leave default on normal installs."
    key: cy_api_url
    widget: simple_text
    type: string
    default: "https://api.us.cycloid.io"
    required: false

  - name: "Cycloid API key (fallback)"
    description: "Org API key with permission to list inventory outputs. Required only if the Plugin Manager proxy env vars are missing."
    key: cy_api_key
    widget: simple_text
    type: string
    required: false
