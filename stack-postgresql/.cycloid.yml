---
# Configuration of the Cycloid stack
version: '4'
name: 'PostgreSQL Database'
canonical: stack-postgresql-demo
author: Cycloid
description: |
  Deploys a PostgreSQL database.
image: |
  https://cycloid-demo-stacks-logo.s3.eu-west-1.amazonaws.com/postgresql.svg
keywords:
  - rds
  - database
  - postgresql
  - clevercloud
  - vmware
  - ec2
technologies:
- technology: terraform
  version: 1.8.3
- technology: ansible
  version: "2.16"

config:
  aws:
    name: 'Amazon RDS for PostgreSQL'
    description: 'Amazon Relational Database Service (Amazon RDS) for PostgreSQL.'
    cloud_provider: aws
    pipeline:
      pipeline:
        path: 'pipeline/pipeline.yml'
      variables:
        path: 'pipeline/variables.sample.yml'
        destination: '($ .config_root $)/pipeline/variables.yml'
    terraform:
      main:
        path: 'terraform/aws/main.tf'
        destination: '($ .config_root $)/terraform/aws/main.tf'

  azure:
    name: 'Azure Database for PostgreSQL'
    description: 'Azure Database with Flexible Server for PostgreSQL.'
    cloud_provider: azure
    pipeline:
      pipeline:
        path: 'pipeline/pipeline.yml'
      variables:
        path: 'pipeline/variables.sample.yml'
        destination: '($ .config_root $)/pipeline/variables.yml'
    terraform:
      main:
        path: 'terraform/azure/main.tf'
        destination: '($ .config_root $)/terraform/azure/main.tf'

  gcp:
    name: 'Google Cloud SQL for PostgreSQL'
    description: 'Google Cloud SQL managed PostgreSQL database.'
    cloud_provider: gcp
    pipeline:
      pipeline:
        path: 'pipeline/pipeline.yml'
      variables:
        path: 'pipeline/variables.sample.yml'
        destination: '($ .config_root $)/pipeline/variables.yml'
    terraform:
      main:
        path: 'terraform/gcp/main.tf'
        destination: '($ .config_root $)/terraform/gcp/main.tf'

  clevercloud:
    name: 'Clever Cloud PostgreSQL'
    description: 'Managed PostgreSQL add-on on Clever Cloud.'
    cloud_provider: clevercloud
    pipeline:
      pipeline:
        path: 'pipeline/pipeline.yml'
      variables:
        path: 'pipeline/variables.sample.yml'
        destination: '($ .config_root $)/pipeline/variables.yml'
    terraform:
      main:
        path: 'terraform/clevercloud/main.tf'
        destination: '($ .config_root $)/terraform/clevercloud/main.tf'

  vmware:
    name: 'PostgreSQL on VMware'
    description: 'PostgreSQL on a virtual machine — provisions a public AWS EC2 instance and installs PostgreSQL with Ansible.'
    cloud_provider: vmware
    pipeline:
      pipeline:
        path: 'pipeline/pipeline.yml'
      variables:
        path: 'pipeline/variables.sample.yml'
        destination: '($ .config_root $)/pipeline/variables.yml'
    terraform:
      main:
        path: 'terraform/vmware/main.tf'
        destination: '($ .config_root $)/terraform/vmware/main.tf'
    ansible:
      playbook:
        path: 'ansible/environments/postgresql.yml.sample'
        destination: '($ .config_root $)/ansible/environments/postgresql.yml'
