#
# Cloud credentials and settings are provided by the managed environment.
#
# AWS use case:
# - Cloud account (aws): env_providers.aws.access_key, env_providers.aws.secret_key
# - Region: env_vars.aws_region
#
# Azure use case:
# - Cloud account (azurerm): env_providers.azurerm.client_id, client_secret, tenant_id, subscription_id
#
# GCP use case:
# - Cloud account (google): env_providers.google.json_key
# - Project: env_vars.gcp_project
# - Region: env_vars.gcp_region
# - Zone: env_vars.gcp_zone
#
# Clever Cloud use case:
# - Cloud account (clevercloud): env_providers.clevercloud.token, secret, organisation
#

#
# Day 2 CLI Operations
#

#. destroy_timer_in_minutes (required): 60
#+ The number of minutes to wait before automatically destroying the infrastructure after creation.
destroy_timer_in_minutes: 60

#
# Default variables
#

#. cy_api_key (required): ((admin-api-key.key))
#+ API key to grant admin acess to Cycloid API.
cy_api_key: ((admin-api-key.key))

#. terraform_version (required): '1.8.3'
#+ terraform version used to execute your code.
terraform_version: '1.8.3'

#
# Plugin registration (after Terraform deploy)
#
# Requires a connected Plugin Manager and registry with Adminer + PostgreSQL Users published.
# List registries:  cy plugin registry list --org <org>
# List plugins:     cy plugin registry plugin list <registry>
# List versions:    cy plugin registry plugin version list --registry <registry> --plugin <name>
#

#. register_plugins (optional): true
#+ Install Adminer and PostgreSQL Users and enable them on the deployed component.
register_plugins: true

#. plugin_registry (optional):
#+ Plugin registry name, canonical, or numeric ID. Leave empty when the org has exactly one registry.
plugin_registry:

#. plugin_adminer_name (required): cycloid-plugin-adminer
#+ Adminer plugin name in the registry (from cy plugin registry plugin list).
plugin_adminer_name: cycloid-plugin-adminer

#. plugin_adminer_install_name (optional): cycloid-plugin-adminer
#+ Installed plugin name for cy plugin get/upgrade/relation-set (defaults to registry name).
plugin_adminer_install_name: cycloid-plugin-adminer

#. plugin_adminer_version_id (required): 1
#+ Registry version ID for Adminer (from cy plugin registry plugin version list).
plugin_adminer_version_id: 1

#. plugin_postgresql_users_name (required): cycloid-plugin-postgresql-users
#+ PostgreSQL Users plugin name in the registry.
plugin_postgresql_users_name: cycloid-plugin-postgresql-users

#. plugin_postgresql_users_install_name (optional): cycloid-plugin-postgresql-users
#+ Installed plugin name for cy plugin get/upgrade/relation-set.
plugin_postgresql_users_install_name: cycloid-plugin-postgresql-users

#. plugin_postgresql_users_version_id (required): 1
#+ Registry version ID for PostgreSQL Users.
plugin_postgresql_users_version_id: 1
