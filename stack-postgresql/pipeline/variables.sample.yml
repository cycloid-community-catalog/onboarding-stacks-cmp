#
# Cloud credentials and settings are provided by the managed environment.
#
# AWS use case:
# - Cloud account (aws): env_providers.aws.access_key, env_providers.aws.secret_key
# - Region: env_vars.aws_region
#
# Azure use case:
# - Cloud account (azurerm): env_providers.azurerm.client_id, client_secret, tenant_id, subscription_id
#
# GCP use case:
# - Cloud account (google): env_providers.google.json_key
# - Project: env_vars.gcp_project
# - Region: env_vars.gcp_region
# - Zone: env_vars.gcp_zone
#
# Clever Cloud use case:
# - Cloud account (clevercloud): env_providers.clevercloud.token, secret, organisation
# - organisation must be orga_<uuid> or user_<uuid> (Clever Cloud console → Organisation settings)
#
# VMware use case (AWS EC2 as we don't have a VMware lab yet + cloud-init PostgreSQL bootstrap):
# - Cloud account (aws): env_providers.aws.access_key, env_providers.aws.secret_key
# - Region: env_vars.aws_region
#

#
# Day 2 CLI Operations
#

#. destroy_timer_in_minutes (required): 60
#+ The number of minutes to wait before automatically destroying the infrastructure after creation.
destroy_timer_in_minutes: 60

#
# Default variables
#

#. cy_api_key (required): ((admin-api-key.key))
#+ API key to grant admin acess to Cycloid API.
cy_api_key: ((admin-api-key.key))

#. terraform_version (required): '1.8.3'
#+ terraform version used to execute your code.
terraform_version: '1.8.3'

#. ansible_version (optional): 'v8.3'
#+ cycloid-toolkit image tag for the VMware Ansible install-postgresql job.
ansible_version: 'v8.3'

#
# Plugin registration (after Terraform deploy)
#
# Requires a connected Plugin Manager and registry with Adminer + PostgreSQL Users published.
# List registries:  cy plugin registry list --org <org>
# List plugins:     cy plugin registry plugin list <registry>
# List versions:    cy plugin registry plugin version list --registry <registry> --plugin <name>
#

#. register_plugins (optional): true
#+ Install Adminer and PostgreSQL Users and enable them on the deployed component.
register_plugins: true

#. plugin_registry (optional): ""
#+ Plugin registry name, canonical, or numeric ID (e.g. local or 29). Leave empty when the org has exactly one registry.
plugin_registry: ""

#. plugin_adminer_name (optional): Adminer
#+ Adminer plugin name in the registry (from cy plugin registry plugin list). Aliases tried: Adminer, cycloid-plugin-adminer, adminer.
plugin_adminer_name: Adminer

#. plugin_adminer_install_name (optional): Adminer
#+ Installed plugin name for cy plugin get/upgrade/relation-set.
plugin_adminer_install_name: Adminer

#. plugin_adminer_version_id (optional):
#+ Registry version ID for Adminer. Leave empty or set to latest to install the newest published version.
plugin_adminer_version_id: ""

#. plugin_postgresql_users_name (optional): "PostgreSQL Users"
#+ PostgreSQL Users plugin name in the registry. Aliases tried: PostgreSQL Users, cycloid-plugin-postgresql-users, postgresql-users.
plugin_postgresql_users_name: "PostgreSQL Users"

#. plugin_postgresql_users_install_name (optional): "PostgreSQL Users"
#+ Installed plugin name for cy plugin get/upgrade/relation-set.
plugin_postgresql_users_install_name: "PostgreSQL Users"

#. plugin_postgresql_users_version_id (optional):
#+ Registry version ID for PostgreSQL Users. Leave empty or set to latest to install the newest published version.
plugin_postgresql_users_version_id: ""
