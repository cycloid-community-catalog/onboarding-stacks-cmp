resource_types:
- name: terraform
  type: registry-image
  source:
    repository: cycloid/terraform-resource
    tag: ((terraform_version))


resources:
- name: tfstate
  type: terraform
  icon: terraform
  source:
    env_name: ($ .env $)
    backend_type: http
    backend_config:
      address: '($ .api_url $)/inventory?jwt=($ .inventory_jwt $)'
    vars:
      cy_api_key: ((cy_api_key))
      cy_api_url: ($ .api_url $)
      cy_org: ($ .org $)
      cy_project: ($ .project $)
      cy_env: ($ .env $)
      cy_component: ($ .component $)
($ if eq .use_case "aws" $)
      aws_access_key: ($ .env_providers.aws.access_key $)
      aws_secret_key: ($ .env_providers.aws.secret_key $)
      aws_region: ($ .env_vars.aws_region $)
($ else if eq .use_case "azure" $)
      azure_client_id: ($ .env_providers.azurerm.client_id $)
      azure_client_secret: ($ .env_providers.azurerm.client_secret $)
      azure_tenant_id: ($ .env_providers.azurerm.tenant_id $)
      azure_subscription_id: ($ .env_providers.azurerm.subscription_id $)
($ else if eq .use_case "gcp" $)
      gcp_credentials_json: ($ .env_providers.google.json_key $)
      gcp_project: ($ .env_vars.gcp_project $)
      gcp_region: ($ .env_vars.gcp_region $)
      gcp_zone: ($ .env_vars.gcp_zone $)
    env:
      GOOGLE_PROJECT: ($ .env_vars.gcp_project $)
      GOOGLE_REGION: ($ .env_vars.gcp_region $)
      GOOGLE_ZONE: ($ .env_vars.gcp_zone $)
      GOOGLE_CREDENTIALS: ($ .env_providers.google.json_key $)
($ else if eq .use_case "clevercloud" $)
      clevercloud_token: ($ .env_providers.clevercloud.token $)
      clevercloud_secret: ($ .env_providers.clevercloud.secret $)
      clevercloud_organisation: ($ .env_providers.clevercloud.organisation $)
($ end $)


# The Terraform stack (will be merged with the config)
- name: git_stack-terraform
  type: git
  icon: github-circle
  source:
    uri: ($ .scs_url $)
    ($- if eq .stack_version_type "tag" $)
    tag_filter: ($ .stack_version_ref $)
    fetch_tags: true
    ($- else $)
    branch: ($ coalesce .stack_version_ref .catalog_repository_branch $)
    ($- end $)
    ($- if eq .scs_cred_type "basic_auth" $)
    username: ((($ .scs_cred_path $).username))
    password: ((($ .scs_cred_path $).password))
    ($- end $)
    ($- if eq .scs_cred_type "ssh" $)
    private_key: ((($ .scs_cred_path $).ssh_key))
    ($- end $)
    ($- if ne .stack_version_type "tag" $)
    paths:
      - ($ .stack_path $)/terraform/($ .use_case $)/*
    ($- end $)

# The Terraform config (will be merged with the stack)
- name: git_config-terraform
  type: git
  icon: github-circle
  source:
    uri: ($ .cr_url $)
    branch: ($ .cr_branch $)
    ($- if eq .cr_cred_type "basic_auth" $)
    username: ((($ .cr_cred_path $).username))
    password: ((($ .cr_cred_path $).password))
    ($- end $)
    ($- if eq .cr_cred_type "ssh" $)
    private_key: ((($ .cr_cred_path $).ssh_key))
    ($- end $)
    paths:
      - ($ .config_root $)/terraform/($ .use_case $)/*


groups:
- name: overview
  jobs:
    - deploy

- name: actions
  jobs:
    - snapshot
    - full-backup
    - restore

- name: destroy
  jobs:
    - destroy


jobs:
  - name: deploy
    serial: true
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - in_parallel:
        - get: git_stack-terraform
          trigger: true
        - get: git_config-terraform
          trigger: true

      - task: merge-stack-and-config
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
              tag: latest
          run:
            path: /usr/bin/merge-stack-and-config
          inputs:
          - name: git_config-terraform
            path: "config"
          - name: git_stack-terraform
            path: "stack"
          outputs:
          - name: merged-stack
            path: "merged-stack"
        params:
          CONFIG_PATH: ($ .config_root $)/terraform/($ .use_case $)
          STACK_PATH: ($ .stack_path $)/terraform/($ .use_case $)

      - put: tfstate
        params:
          terraform_source: merged-stack/

      - task: register-plugins
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
              tag: latest
          inputs:
          - name: tfstate
            path: tfstate
          run:
            path: /bin/bash
            args:
              - '-ec'
              - |
                if [[ "${REGISTER_PLUGINS}" != "true" ]]; then
                  echo "register_plugins is disabled — skipping plugin registration"
                  exit 0
                fi

                resolve_plugin_registry() {
                  if [[ -n "${PLUGIN_REGISTRY}" ]]; then
                    if cy plugin registry get "${PLUGIN_REGISTRY}" >/dev/null 2>&1; then
                      echo "${PLUGIN_REGISTRY}"
                      return 0
                    fi
                    echo "error: plugin registry '${PLUGIN_REGISTRY}' not found in org ${CY_ORG}" >&2
                    echo "Available registries:" >&2
                    cy plugin registry list >&2 || true
                    exit 1
                  fi

                  local registries count
                  registries="$(cy plugin registry list -o json | jq -r '
                    if type == "array" then .
                    elif (.data | type) == "array" then .data
                    else []
                    end
                    | .[]
                    | (.canonical // .name // (.id | tostring))
                  ')"
                  count="$(printf '%s\n' "${registries}" | sed '/^$/d' | wc -l | tr -d ' ')"

                  if [[ "${count}" == "1" ]]; then
                    printf '%s\n' "${registries}" | head -1
                    return 0
                  fi

                  echo "error: plugin_registry is not set and org ${CY_ORG} has ${count} registries" >&2
                  echo "Set plugin_registry in pipeline/variables.yml to a registry name or numeric ID from:" >&2
                  cy plugin registry list >&2 || true
                  exit 1
                }

                PLUGIN_REGISTRY="$(resolve_plugin_registry)"
                echo "Using plugin registry: ${PLUGIN_REGISTRY}"

                resolve_registry_plugin() {
                  local configured="${1}"
                  shift
                  local candidate

                  for candidate in "${configured}" "$@"; do
                    if [[ -n "${candidate}" ]] && cy plugin registry plugin get "${candidate}" --registry "${PLUGIN_REGISTRY}" >/dev/null 2>&1; then
                      echo "${candidate}"
                      return 0
                    fi
                  done

                  echo "error: registry plugin '${configured}' not found in registry ${PLUGIN_REGISTRY}" >&2
                  echo "Tried: ${configured} $*" >&2
                  echo "Available plugins:" >&2
                  cy plugin registry plugin list "${PLUGIN_REGISTRY}" >&2 || true
                  echo "Set plugin_adminer_name / plugin_postgresql_users_name in pipeline/variables.yml" >&2
                  exit 1
                }

                resolve_plugin_version_id() {
                  local registry_plugin="${1}"
                  local configured="${2}"

                  if [[ -n "${configured}" && "${configured}" != "latest" ]]; then
                    if cy plugin registry plugin version get "${configured}" \
                      --registry "${PLUGIN_REGISTRY}" \
                      --plugin "${registry_plugin}" >/dev/null 2>&1; then
                      echo "${configured}"
                      return 0
                    fi
                    echo "warning: plugin version ${configured} not found for ${registry_plugin}, using latest" >&2
                  fi

                  local version_id
                  version_id="$(cy plugin registry plugin version list \
                    --registry "${PLUGIN_REGISTRY}" \
                    --plugin "${registry_plugin}" \
                    -o json | jq -r '
                      if type == "array" then .
                      elif (.data | type) == "array" then .data
                      else []
                      end
                      | if length == 0 then empty else . end
                      | max_by(.id // 0)
                      | (.id | tostring)
                    ')"

                  if [[ -z "${version_id}" ]]; then
                    echo "error: no versions published for plugin ${registry_plugin} in registry ${PLUGIN_REGISTRY}" >&2
                    exit 1
                  fi

                  echo "${version_id}"
                }

                METADATA=tfstate/metadata
                for key in database_host database_port database_user database_password database_name; do
                  val="$(KEY="${key}" jq -r '.[env.KEY] // empty' "${METADATA}")"
                  if [[ -z "${val}" || "${val}" == "null" ]]; then
                    echo "error: missing terraform output ${key} in ${METADATA}" >&2
                    exit 1
                  fi
                done

                DB_HOST="$(jq -r .database_host "${METADATA}")"
                DB_PORT="$(jq -r .database_port "${METADATA}")"
                DB_USER="$(jq -r .database_user "${METADATA}")"
                DB_PASSWORD="$(jq -r .database_password "${METADATA}")"
                DB_NAME="$(jq -r .database_name "${METADATA}")"
                DB_SSL_SERVERNAME="$(jq -r '.postgresql_server_fqdn // empty' "${METADATA}")"
                if [[ "${DB_SSL_SERVERNAME}" == "null" ]]; then
                  DB_SSL_SERVERNAME=""
                fi

                install_or_upgrade_plugin() {
                  local install_name="${1}"
                  local registry_plugin="${2}"
                  local version_id="${3}"

                  local resolved_install_name="${install_name}"
                  if ! cy plugin get "${resolved_install_name}" >/dev/null 2>&1 \
                    && [[ "${registry_plugin}" != "${install_name}" ]] \
                    && cy plugin get "${registry_plugin}" >/dev/null 2>&1; then
                    resolved_install_name="${registry_plugin}"
                  fi

                  if cy plugin get "${resolved_install_name}" >/dev/null 2>&1; then
                    echo "Upgrading plugin ${resolved_install_name}..." >&2
                    cy plugin upgrade "${resolved_install_name}" --version-id "${version_id}" "${@:4}" || return 1
                  else
                    echo "Installing plugin ${registry_plugin} (version ${version_id})..." >&2
                    cy plugin registry plugin version install "${version_id}" \
                      --registry "${PLUGIN_REGISTRY}" \
                      --plugin "${registry_plugin}" \
                      --retry \
                      "${@:4}" || return 1
                  fi

                  resolve_installed_plugin_ref \
                    "${install_name}" \
                    "${registry_plugin}" \
                    "${resolved_install_name}"
                }

                plugin_install_id_from_get() {
                  local candidate="${1}"
                  cy plugin get "${candidate}" -o json 2>/dev/null | jq -er '
                    if type == "array" then .[0] else . end
                    | .id // .install_id // empty
                  ' 2>/dev/null || true
                }

                resolve_installed_plugin_ref() {
                  local preferred="${1}"
                  local registry_plugin="${2}"
                  shift 2
                  local candidate install_id attempt

                  for attempt in $(seq 1 10); do
                    for candidate in "${preferred}" "${registry_plugin}" "$@"; do
                      if [[ -z "${candidate}" ]]; then
                        continue
                      fi
                      install_id="$(plugin_install_id_from_get "${candidate}")"
                      if [[ -n "${install_id}" && "${install_id}" != "null" ]]; then
                        echo "${install_id}"
                        return 0
                      fi
                    done

                    install_id="$(PREF="${preferred}" REG="${registry_plugin}" cy plugin list -o json | jq -er '
                      def plugins:
                        if type == "array" then .
                        elif (.data | type) == "array" then .data
                        else []
                        end;
                      def norm: ascii_downcase | gsub("[^a-z0-9]"; "");
                      plugins[]
                      | select(
                          ((.name // "" | norm) == (env.PREF | norm))
                          or ((.canonical // "" | norm) == (env.PREF | norm))
                          or ((.name // "" | norm) == (env.REG | norm))
                          or ((.canonical // "" | norm) == (env.REG | norm))
                        )
                      | (.id // .install_id)
                    ' 2>/dev/null | head -1)" || true

                    if [[ -n "${install_id}" && "${install_id}" != "null" ]]; then
                      echo "${install_id}"
                      return 0
                    fi

                    if [[ "${attempt}" -lt 10 ]]; then
                      echo "waiting for plugin install to register (${attempt}/10)..." >&2
                      sleep 3
                    fi
                  done

                  echo "error: org plugin install not found after install (tried: ${preferred}, ${registry_plugin})" >&2
                  echo "Installed plugins:" >&2
                  cy plugin list >&2 || true
                  exit 1
                }

                enable_on_component() {
                  local install_ref="${1}"
                  echo "Enabling plugin install ${install_ref} on ${CY_PROJECT}/${CY_ENV}/${CY_COMPONENT}..."
                  cy plugin component relation-set "${install_ref}" \
                    --project "${CY_PROJECT}" \
                    --env "${CY_ENV}" \
                    --component "${CY_COMPONENT}" \
                    --enabled || return 1
                }

                ADMINER_REGISTRY_PLUGIN="$(resolve_registry_plugin \
                  "${PLUGIN_ADMINER_NAME}" \
                  Adminer cycloid-plugin-adminer adminer)"
                echo "Using Adminer registry plugin: ${ADMINER_REGISTRY_PLUGIN}"

                ADMINER_VERSION_ID="$(resolve_plugin_version_id \
                  "${ADMINER_REGISTRY_PLUGIN}" \
                  "${PLUGIN_ADMINER_VERSION_ID}")"
                echo "Using Adminer version: ${ADMINER_VERSION_ID}"

                ADMINER_INSTALL_REF="$(install_or_upgrade_plugin \
                  "${PLUGIN_ADMINER_INSTALL_NAME}" \
                  "${ADMINER_REGISTRY_PLUGIN}" \
                  "${ADMINER_VERSION_ID}")" || exit 1
                enable_on_component "${ADMINER_INSTALL_REF}" || exit 1

                PG_CONFIG=(
                  --config "database_host=${DB_HOST}"
                  --config "database_port=${DB_PORT}"
                  --config "database_user=${DB_USER}"
                  --config "database_password=${DB_PASSWORD}"
                  --config "database_name=${DB_NAME}"
                )
                if [[ -n "${DB_SSL_SERVERNAME}" ]]; then
                  PG_CONFIG+=(--config "database_ssl_servername=${DB_SSL_SERVERNAME}")
                fi

                PG_USERS_REGISTRY_PLUGIN="$(resolve_registry_plugin \
                  "${PLUGIN_PG_USERS_NAME}" \
                  "PostgreSQL Users" cycloid-plugin-postgresql-users postgresql-users)"
                echo "Using PostgreSQL Users registry plugin: ${PG_USERS_REGISTRY_PLUGIN}"

                PG_USERS_VERSION_ID="$(resolve_plugin_version_id \
                  "${PG_USERS_REGISTRY_PLUGIN}" \
                  "${PLUGIN_PG_USERS_VERSION_ID}")"
                echo "Using PostgreSQL Users version: ${PG_USERS_VERSION_ID}"

                PG_USERS_INSTALL_REF="$(install_or_upgrade_plugin \
                  "${PLUGIN_PG_USERS_INSTALL_NAME}" \
                  "${PG_USERS_REGISTRY_PLUGIN}" \
                  "${PG_USERS_VERSION_ID}" \
                  "${PG_CONFIG[@]}")" || exit 1
                enable_on_component "${PG_USERS_INSTALL_REF}" || exit 1

                echo "Plugins registered and enabled on component ${CY_COMPONENT}"
        params:
          REGISTER_PLUGINS: '((register_plugins))'
          PLUGIN_REGISTRY: '((plugin_registry))'
          PLUGIN_ADMINER_NAME: '((plugin_adminer_name))'
          PLUGIN_ADMINER_INSTALL_NAME: '((plugin_adminer_install_name))'
          PLUGIN_ADMINER_VERSION_ID: '((plugin_adminer_version_id))'
          PLUGIN_PG_USERS_NAME: '((plugin_postgresql_users_name))'
          PLUGIN_PG_USERS_INSTALL_NAME: '((plugin_postgresql_users_install_name))'
          PLUGIN_PG_USERS_VERSION_ID: '((plugin_postgresql_users_version_id))'
          CY_API_KEY: ((cy_api_key))
          CY_API_URL: ($ .api_url $)
          CY_ORG: ($ .org $)
          CY_PROJECT: ($ .project $)
          CY_ENV: ($ .env $)
          CY_COMPONENT: ($ .component $)


  - name: snapshot
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - task: snapshot
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
          run:
            path: /bin/bash
            args:
              - '-ec'
              - |
                echo "Snapshotting database... Done"


  - name: full-backup
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - task: full-backup
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
          run:
            path: /bin/bash
            args:
              - '-ec'
              - |
                echo "Running full backup... Done"


  - name: restore
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - task: restore
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
          run:
            path: /bin/bash
            args:
              - '-ec'
              - |
                echo "Restoring database from backup... Done"


  - name: destroy
    max_in_flight: 1
    build_logs_to_retain: 10
    plan:
      - in_parallel:
        - get: git_stack-terraform
          trigger: false
        - get: git_config-terraform
          trigger: false
        - get: tfstate
          trigger: true

      - task: timer-before-destroy
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
          run:
            path: /bin/bash
            args:
              - '-ec'
              - |
                sleep ${destroy_timer_in_minutes}m
        params:
          destroy_timer_in_minutes: ((destroy_timer_in_minutes))

      - task: merge-stack-and-config
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: cycloid/cycloid-toolkit
              tag: latest
          run:
            path: /usr/bin/merge-stack-and-config
          inputs:
          - name: git_config-terraform
            path: "config"
          - name: git_stack-terraform
            path: "stack"
          outputs:
          - name: merged-stack
            path: "merged-stack"
        params:
          CONFIG_PATH: ($ .config_root $)/terraform/($ .use_case $)
          STACK_PATH: ($ .stack_path $)/terraform/($ .use_case $)

      - put: tfstate
        params:
          action: destroy
          terraform_source: merged-stack/
        get_params:
          action: destroy