description: "Read-only iframe table listing PostgreSQL database users for stack-postgresql components."
icon: "https://cycloid-demo-stacks-logo.s3.eu-west-1.amazonaws.com/postgresql.svg"

scope:
  - organization:project:*
  - organization:inventory-output:*

configuration:
  - name: "Database port"
    description: "Default PostgreSQL port when the Terraform output does not include one."
    key: db_port
    widget: simple_text
    type: string
    default: "5432"
    required: true

  - name: "Cycloid API URL"
    description: "Cycloid API base URL. Required for iframe widgets (e.g. https://api.us.cycloid.io)."
    key: cy_api_url
    widget: simple_text
    type: string
    default: "https://api.us.cycloid.io"
    required: true

  - name: "Cycloid API key"
    description: "Org API key with inventory output read access. Required for iframe widgets to avoid Plugin Manager deadlocks."
    key: cy_api_key
    widget: simple_text
    type: string
    required: true
